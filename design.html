<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
 
<link rel="stylesheet" href="style.css">
 
</head>
<body>
 
<form onsubmit="return validateForm()">
 
<table>
 
<tr>
<td colspan="2" class="center">
<h2>Contact Us</h2>
</td>
</tr>
 
<tr>
<td style="width:50%; padding-right:5px;">First Name</td>
<td style="width:50%; padding-left:5px;">Last Name</td>
</tr>
 
<tr>
<td style="padding-right:5px;">
<input type="text" id="firstName">
</td>
 
<td style="padding-left:5px;">
<input type="text" id="lastName">
</td>
</tr>
 
<tr>
<td colspan="2">Email</td>
</tr>
 
<tr>
<td colspan="2">
<input type="email" id="email">
</td>
</tr>
 
<tr>
<td colspan="2">Mobile Number</td>
</tr>
 
<tr>
<td colspan="2">
<input type="tel" id="mobile">
</td>
</tr>
 
<tr>
<td colspan="2">What do you have in mind?</td>
</tr>
 
<tr>
<td colspan="2">
<textarea id="message" placeholder="What do you have in mind?"></textarea>
</td>
</tr>
 
<tr>
<td colspan="2">
<button type="submit">Submit</button>
</td>
</tr>
 
</table>
 
</form>
 
<script src="script.js"></script>
 
</body>
</html>
