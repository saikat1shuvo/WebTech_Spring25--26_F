
<html>
    <head>
        <title>Student Registration Page</title>
    </head>
    <body>
        <br>
        <h1><center>Student Registration Page </center></h1>
        <br>
        <form>
            <label for = "name"> Student Name: </label>
            <input type="text" id="name " name = "name" required><br><br>

             <label for = "CGPA"> Student CGPA: </label>
             <input type="number" id="CGPA " name = "CGPA" required><br><br>

             <label for = "GenderMale"> Male: </label>
             <input type="radio" id="GenderMale " name = "Gender" value="Male"><br><br>

            <label for = "GenderFemale"> Female: </label>
            <input type="radio" id="GenderFemale " name = "Gender" value="Female"><br><br>

             <label for="Department">Department:</label>
             <select id ="Department" name="Department" required>
                        <option value="">Select Department</option>
                        <option value="CSE">Computer Science and Engineering</option> 
                        <option value="EEE">Electrical and Electronic Engineering</option>
                        <option value="BBA">Business Administration</option>
                        <option value="LLb">Law</option>
                    </select><br><br>
                    <label for ="ID">Student ID:</label>
                    <input type="text" id="name " name = "name" required><br><br>

                    
                     <label for ="Address"> Address: </label>
                     <textarea id ="Address"  name = "Student Address" row="4" cols="30" placeholder="Enter The Address"></textarea><br><br>

                     
                     <label for ="DOB">Date of Birth: </label>
                     <input type="date" id="DOB" name = "DOB" required><br><br>



                     <label for ="Email">Student Email:</label>
                     <input type="email" id="Email " name = "Email" required><br><br>

                     <label for ="Insert File">Upload Your Grade: </label>
                     <input type="File" id="insert File " name = "Insert File" required><br><br>

                     
                     <label for ="terms">I agree to the terms and conditions: </label>
                     <input type="checkbox" id="terms"  name = "terms" required><br><br>

                     
                     <label for ="Phone">Phone Number: </label>
                     <input type="number" id="Phone " name = "Phone" required><br><br>

                     
                     <label for ="Submit">Submit your information: </label>
                     <input type="submit" id="submit " name = "submit" required><br><br>
        </form>
    </body>
</html>
