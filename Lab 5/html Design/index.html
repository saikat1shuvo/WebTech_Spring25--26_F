<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Analysis Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Text Analysis Tool</h2>
    <textarea id="textInput" placeholder="এখানে আপনার প্যারাগ্রাফ পেস্ট করুন..."></textarea>
    <br>
    <button id="analyzeBtn">Analyze Text</button>

    <div id="result">
        <div class="result-item">
            <strong>Character Count:</strong> <span id="charCount">0</span>
        </div>
        <div class="result-item">
            <strong>Word Count:</strong> <span id="wordCount">0</span>
        </div>
        <div class="result-item">
            <strong>Reversed Text:</strong>
            <div id="reversedOutput" class="reversed-text"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
